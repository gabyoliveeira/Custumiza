<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Custumiza - Cadastro</title>
    <link rel="stylesheet" href="/style/global.css">
    <link rel="stylesheet" href="/style/autenticacao.css">
</head>
<body>
    <header>
        <div class="logo">Custumiza</div>
    </header>

    <main class="auth-container">
        <div class="auth-box">
            <a href="login.html" class="btn-voltar-home">← Voltar ao Login</a>
            <h1>Crie sua conta</h1>
            <p>Preencha os dados para começar a personalizar.</p>

            <form id="formCadastro">
                <div class="campo">
                    <label>Nome Completo</label>
                    <input type="text" id="nome" placeholder="Como quer ser chamado?" required>
                </div>

                <div class="campo">
                    <label>E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>

                <div class="campo">
                    <label>Sua Senha</label>
                    <input type="password" id="senha" placeholder="Mínimo 6 caracteres" required>
                </div>

                <div class="campo">
                    <label>Confirmar Senha</label>
                    <input type="password" id="confirmaSenha" placeholder="Repita a senha" required>
                </div>

                <button type="submit" class="btn-acao">Finalizar Cadastro</button>
            </form>

            <div class="auth-footer">
                <span>Já é cadastrado? <a href="login.html">Fazer Login</a></span>
            </div>
        </div>
    </main>

    <script src="scripts/cadastro.js"></script>
</body>
</html>
