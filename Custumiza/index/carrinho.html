<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Custumiza - Meu Carrinho</title>
    <link rel="stylesheet" href="/style/global.css">
    <link rel="stylesheet" href="/style/carrinho.css">
</head>
<body>
    <header><div class="logo">Custumiza</div></header>

    <main class="carrinho-container">
        <h1>Meu Carrinho</h1>
        
        <div class="carrinho-grid">
            <div id="listaItensCarrinho" class="itens-carrinho">
                </div>

            <aside class="resumo-carrinho">
                <h3>Resumo</h3>
                <div class="linha-resumo">
                    <span>Subtotal:</span>
                    <span id="subtotal">R$ 0,00</span>
                </div>
                <div class="linha-resumo">
                    <span>Frete:</span>
                    <span>R$ 15,00</span>
                </div>
                <hr>
                <div class="linha-resumo total">
                    <span>Total:</span>
                    <strong id="totalCarrinho">R$ 15,00</strong>
                </div>
                <button class="btn-acao" onclick="finalizarPedido()">Finalizar Compra</button>
            </aside>
        </div>
    </main>

    <script src="scripts/global.js"></script>
    <script src="scripts/carrinho.js"></script>
</body>
</html>
