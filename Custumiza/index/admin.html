<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Custumiza - Painel Admin</title>
    <link rel="stylesheet" href="/style/global.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <header>
        <div class="logo">Custumiza | Admin</div>
        <nav>
            <a href="home.html">Ver Site</a>
            <button id="btnSair">Sair</button>
        </nav>
    </header>

    <main class="admin-container">
        <aside class="sidebar">
            <ul>
                <li class="active">📦 Produtos</li>
                <li>📊 Pedidos</li>
                <li>👥 Usuários</li>
            </ul>
        </aside>

        <section class="conteudo-admin">
            <h2>Cadastrar Novo Produto</h2>
            
            <form id="formCadastroProduto" class="card-form">
                <div class="linha-form">
                    <div class="campo">
                        <label>Nome do Produto</label>
                        <input type="text" id="nomeItem" placeholder="Ex: Caneca Branca" required>
                    </div>
                    <div class="campo">
                        <label>Preço (R$)</label>
                        <input type="number" id="precoItem" step="0.01" placeholder="29.90" required>
                    </div>
                </div>

                <div class="linha-form">
                    <div class="campo">
                        <label>Categoria</label>
                        <select id="categoriaItem">
                            <option value="Cerâmica">Cerâmica</option>
                            <option value="Térmicas">Térmicas</option>
                            <option value="Vidro">Vidro</option>
                            <option value="Mágicas">Mágicas</option>
                        </select>
                    </div>
                    <div class="campo">
                        <label>URL da Imagem</label>
                        <input type="text" id="urlImagemItem" placeholder="img/caneca-nova.jpg">
                    </div>
                </div>

                <div class="campo">
                    <label>Descrição</label>
                    <textarea id="descItem" rows="3" placeholder="Detalhes do produto..."></textarea>
                </div>

                <button type="submit" class="btn-salvar">Salvar Produto</button>
            </form>

            <section class="lista-produtos-secao">
                <h2>Produtos no Catálogo</h2>
                <table class="tabela-admin">
                    <thead>
                        <tr>
                            <th>Imagem</th>
                            <th>Nome</th>
                            <th>Preço</th>
                            <th>Categoria</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="corpoTabelaProdutos">
                        </tbody>
                </table>
            </section>

            <hr>

            <h2>Produtos Cadastrados</h2>
            <div id="listaProdutosAdmin" class="tabela-produtos">
                </div>
        </section>
    </main>

    <script src="scripts/global.js"></script>
    <script src="scripts/admin.js"></script>
</body>
</html>
