<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Custumiza - Personalizar</title>
    <link rel="stylesheet" href="/style/global.css">
    <link rel="stylesheet" href="/style/personalizar.css">
</head>
<body>
    <header>
        <div class="logo">Custumiza</div>
        <nav><a href="home.html">Voltar</a></nav>
    </header>

    <main class="editor-container">
        <section class="preview-area">
            <div class="caneca-mockup" id="canecaPreview">
                <span id="textoPreview">Sua Frase Aqui</span>
            </div>
        </section>

        <section class="controles-area">
            <h1>Personalize sua Caneca</h1>
            
            <div class="opcao">
                <label>Cor da Caneca:</label>
                <input type="color" id="corCaneca" value="#ffffff">
            </div>

            <div class="opcao">
                <label>Texto da Caneca:</label>
                <input type="text" id="inputTexto" placeholder="Digite sua frase...">
            </div>

            <div class="opcao">
                <label>Cor do Texto:</label>
                <input type="color" id="corTexto" value="#000000">
            </div>

            <div class="preco-personalizar">
                <span>Total: R$ 45,00</span>
                <button id="btnAdicionarPersonalizado" class="btn-acao">Adicionar ao Carrinho</button>
            </div>
        </section>
    </main>

    <script src="scripts/global.js"></script>
    <script src="scripts/personalizar.js"></script>
</body>
</html>
